name: Nightly Quarantine Tests

on:
  schedule:
    # Runs every night at 2am UTC
    - cron: "0 2 * * *"

  workflow_dispatch:

jobs:
  quarantine-tests:
    name: Playwright quarantine tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run quarantine tests
        run: npx playwright test --grep @quarantine

      - name: Upload quarantine report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-quarantine-report
          path: playwright-report
          retention-days: 7